services:
  backend:
    build: .
    container_name: openshorts-backend
    ports:
      - "8000:8000"
    environment:
      - RENDER_SERVICE_URL=http://renderer:3100
    volumes:
      - .:/app
      - /app/__pycache__
      - ./output:/app/output
    restart: unless-stopped

  frontend:
    build: ./dashboard
    container_name: openshorts-frontend
    ports:
      - "5175:5173"
    environment:
      - VITE_PROXY_BACKEND=http://backend:8000
      - VITE_PROXY_RENDERER=http://renderer:3100
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      - backend

  renderer:
    build:
      context: .
      dockerfile: render-service/Dockerfile
    container_name: openshorts-renderer
    ports:
      - "3100:3100"
    volumes:
      - ./output:/output
    environment:
      - REMOTION_BUNDLE_PATH=/app/remotion
      - OUTPUT_DIR=/output
      - PORT=3100
    restart: unless-stopped
    depends_on:
      - backend
